meters:
  - name: stocks_subscription
    description: Stocks plan monthly subscription (Starter / Developer / Advanced).
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - plan_tier
  - name: options_subscription
    description: Options plan monthly subscription (includes OPRA exchange fee on Business).
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - plan_tier
  - name: indices_subscription
    description: Indices plan monthly subscription.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - plan_tier
  - name: forex_subscription
    description: Forex plan monthly subscription.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - plan_tier
  - name: crypto_subscription
    description: Crypto plan monthly subscription.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - plan_tier
  - name: exchange_passthrough
    description: Exchange data fees (OPRA, CME, NYSE) passed through on Business plans.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
      - exchange_code
principles:
  - name: Visibility
    description: Tag each Polygon API key to a single owning workload to enable accurate allocation.
  - name: Allocation
    description: Allocate subscription cost across consuming products; redistribution requires a Business plan.
  - name: Optimization
    description: Right-size between Starter / Developer / Advanced based on actual rpm and real-time SIP requirements; consolidate API keys per workload.
  - name: Accountability
    description: Assign a billing owner per asset-class subscription; review at renewal and audit unused asset-class subscriptions quarterly.
  - name: Forecasting
    description: Model step-function cost at Developer → Advanced (SIP) and at Business (exchange fees + redistribution).
