reconciled: true
tags:
  - Fintech
  - Market Data
  - FinOps
  - FOCUS
description: >-
  FinOps view of Polygon (Massive). Subscription-based per asset class with multiple tiers; Business
  contracts add redistribution rights and pass through exchange data fees (OPRA, CME, NYSE TAQ).
  Customers should budget per-asset-class subscriptions, expect a step-function when promoting from
  Developer to Advanced (real-time SIP), and reserve a separate line item for exchange-licensed data
  on Business plans.
