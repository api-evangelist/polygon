specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Polygon
providerId: polygon
created: '2026-05-29'
modified: '2026-05-29'
reconciled: false
tags:
  - Fintech
  - Market Data
  - Stocks
  - Options
  - Forex
  - Crypto
  - Indices
  - Futures
  - Plans
description: >-
  Polygon (rebranded as Massive in early 2026) publishes per-asset-class plan tiers (Basic free,
  Starter, Developer, Advanced, Business / Enterprise). Each asset class (Stocks, Options, Indices,
  Forex, Crypto, Futures) has its own pricing ladder with rate-limit and feature differences.
  Pricing values reflect the long-published 2024-2025 schedule and should be re-verified against
  polygon.io/pricing (now redirecting to massive.com/pricing during the rebrand).
notes: >-
  Per-asset-class subscriptions stack — a trader needing Stocks + Options + Crypto subscribes to
  each individually. Business contracts add redistribution rights and pass through exchange fees
  (OPRA, CME, NYSE TAQ). Numbers should be re-verified at next refresh.
sources:
  - https://polygon.io/pricing
  - https://massive.com/pricing
plans:
  - id: polygon-basic
    name: Basic (Free)
    type: freemium
    description: Free tier for evaluation, 5 API calls per minute, end-of-day data only, 2 years history.
    entries:
      - label: Monthly subscription
        name: basic_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate limit
        name: basic_rate
        type: quota
        metric: requests_per_minute
        limit: 5
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: End-of-day data only
      - name: 2 years history
      - name: 1 WebSocket connection limited
