naftiko: "1.0.0-alpha2"

info:
  label: "Polygon Crypto REST API — Aggregates"
  description: >-
    Crypto — Aggregates. 1 operation. Lead operation: Get Aggregate Bars For A Crypto Pair.
    Self-contained Naftiko capability covering one Polygon business surface.
  tags:
    - Polygon
    - Crypto
    - Aggregates
  created: "2026-05-29"
  modified: "2026-05-29"

binds:
  - namespace: env
    keys:
      POLYGON_API_KEY: POLYGON_API_KEY

capability:

  consumes:
    - type: http
      namespace: "crypto-aggregates"
      baseUri: "https://api.polygon.io"
      description: "Polygon Crypto REST API — Aggregates business capability."
      authentication:
        type: bearer
        token: "{{env.POLYGON_API_KEY}}"
      resources:
        - name: "aggs-ticker-cryptoticker-range-multiplier-timespan-from-to"
          path: "/v2/aggs/ticker/{cryptoTicker}/range/{multiplier}/{timespan}/{from}/{to}"
          operations:
            - name: "getCryptoAggregateBars"
              method: GET
              description: "Get Aggregate Bars For A Crypto Pair"
              inputParameters:
                - name: "cryptoTicker"
                  in: path
                  type: string
                  required: true
                - name: "multiplier"
                  in: path
                  type: integer
                  required: true
                - name: "timespan"
                  in: path
                  type: string
                  required: true
                - name: "from"
                  in: path
                  type: string
                  required: true
                - name: "to"
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "crypto-aggregates-rest"
      port: 8080
      description: "REST adapter for Polygon Crypto REST API — Aggregates."
      resources:
        - path: "/v1/v2/aggs/ticker/{crypto-ticker}/range/{multiplier}/{timespan}/{from}/{to}"
          name: "aggs-ticker-cryptoticker-range-multiplier-timespan-from-to"
          description: "REST surface for aggs-ticker-cryptoticker-range-multiplier-timespan-from-to."
          operations:
            - method: GET
              name: "getCryptoAggregateBars"
              description: "Get Aggregate Bars For A Crypto Pair"
              call: "crypto-aggregates.getCryptoAggregateBars"
              with:
                cryptoTicker: "rest.cryptoTicker"
                multiplier: "rest.multiplier"
                timespan: "rest.timespan"
                from: "rest.from"
                to: "rest.to"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "crypto-aggregates-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Polygon Crypto REST API — Aggregates."
      tools:
        - name: "get-aggregate-bars-crypto-pair"
          description: "Get Aggregate Bars For A Crypto Pair"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "crypto-aggregates.getCryptoAggregateBars"
          with:
            cryptoTicker: "tools.cryptoTicker"
            multiplier: "tools.multiplier"
            timespan: "tools.timespan"
            from: "tools.from"
            to: "tools.to"
          outputParameters:
            - type: object
              mapping: "$."
